services:
  postgres:
    image: postgres:16-alpine
    container_name: membumi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: superapp
      POSTGRES_PASSWORD: superapp
      POSTGRES_DB: superapp
    ports:
      - "5433:5432"
    volumes:
      - membumi_pgdata:/var/lib/postgresql/data

volumes:
  membumi_pgdata:
